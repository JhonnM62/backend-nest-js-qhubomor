name: CI/CD Backend Q Hubo Mor

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Contabo VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AUTH_SERVER }}
          username: root
          password: ${{ secrets.AUTH_PASS }}
          script: |
            # 1. Crear directorio del proyecto si no existe
            mkdir -p /root/backend-qhubomor
            cd /root/backend-qhubomor
            
            # 2. Clonar el repositorio o actualizarlo si ya existe
            if [ ! -d ".git" ]; then
              echo "Clonando repositorio por primera vez..."
              git clone https://${{ secrets.TOKEN_NESTQHUBOMOR }}@github.com/JhonnM62/backend-nest-js-qhubomor.git .
            else
              echo "Actualizando repositorio existente..."
              git remote set-url origin https://${{ secrets.TOKEN_NESTQHUBOMOR }}@github.com/JhonnM62/backend-nest-js-qhubomor.git
              git pull origin main
            fi
            
            # 3. Inyectar las variables de entorno desde los secretos de GitHub
            echo "${{ secrets.ENV_FILE_CONTENT }}" > .env
            
            # 4. Construir la nueva imagen de Docker localmente en Contabo
            echo "Construyendo imagen Docker..."
            docker build -t qhubomor-backend .
            
            # 5. Detener y eliminar el contenedor anterior si existe
            echo "Deteniendo contenedor anterior..."
            docker stop qhubomor-backend-app || true
            docker rm qhubomor-backend-app || true
            
            # 6. Levantar el nuevo contenedor mapeando el puerto 8061 (host) al 3000 (contenedor)
            echo "Levantando nuevo contenedor..."
            docker run -d \
              --name qhubomor-backend-app \
              -p 8061:3000 \
              --restart unless-stopped \
              --env-file .env \
              qhubomor-backend
            
            echo "¡Despliegue completado exitosamente!"
