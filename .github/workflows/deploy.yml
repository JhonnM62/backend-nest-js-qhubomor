name: CI/CD Backend Q Hubo Mor

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Parse SSH Credentials
        id: parse
        env:
          AUTH_SERVER: ${{ secrets.AUTH_SERVER }}
        run: |
          if [[ "$AUTH_SERVER" == *"@"* ]]; then
            echo "username=$(echo $AUTH_SERVER | cut -d'@' -f1)" >> $GITHUB_OUTPUT
            echo "host=$(echo $AUTH_SERVER | cut -d'@' -f2)" >> $GITHUB_OUTPUT
          else
            echo "username=root" >> $GITHUB_OUTPUT
            echo "host=$AUTH_SERVER" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Contabo VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.parse.outputs.host }}
          username: ${{ steps.parse.outputs.username }}
          password: ${{ secrets.AUTH_PASS }}
          script: |
            set -e
            
            # 1. Crear directorio del proyecto si no existe
            mkdir -p /root/backend-qhubomor
            cd /root/backend-qhubomor
            
            # 2. Clonar el repositorio o actualizarlo si ya existe
            if [ ! -d ".git" ]; then
              echo "Clonando repositorio por primera vez..."
              git clone https://${{ secrets.TOKEN_NESTQHUBOMOR }}@github.com/JhonnM62/backend-nest-js-qhubomor.git .
            else
              echo "Actualizando repositorio existente..."
              git remote set-url origin https://${{ secrets.TOKEN_NESTQHUBOMOR }}@github.com/JhonnM62/backend-nest-js-qhubomor.git
              git fetch --all
              git reset --hard origin/main
              git clean -fd
            fi
            
            # 3. Inyectar las variables de entorno desde los secretos de GitHub
            cat << 'EOF' > .env
            ${{ secrets.ENV_FILE_CONTENT }}
            EOF
            
            # 4. Construir la nueva imagen de Docker localmente en Contabo (sin cache para asegurar construccion limpia)
            echo "Construyendo imagen Docker..."
            docker build --no-cache -t qhubomor-backend .
            
            # 5. Detener y eliminar el contenedor anterior si existe
            echo "Deteniendo contenedor anterior..."
            docker stop qhubomor-backend-app || true
            docker rm qhubomor-backend-app || true
            
            # 5.1 Crear directorios de subidas en el host para persistencia
            mkdir -p /root/backend-qhubomor/public/uploads/insumos
            mkdir -p /root/backend-qhubomor/public/uploads/gastos
            mkdir -p /root/backend-qhubomor/public/uploads/asistencia
            
            # 5.5 Aplicar migraciones/push de Prisma a la base de datos remotamente (sin borrar data)
            echo "Sincronizando esquema de base de datos..."
            docker run --rm --env-file .env qhubomor-backend npx prisma db push --accept-data-loss
            
            # 6. Levantar el nuevo contenedor mapeando el puerto y el volumen de persistencia
            echo "Levantando nuevo contenedor..."
            docker run -d \
              --name qhubomor-backend-app \
              -p 8061:3000 \
              -v /root/backend-qhubomor/public/uploads:/app/public/uploads \
              --restart unless-stopped \
              --env-file .env \
              qhubomor-backend
            
            echo "¡Despliegue completado exitosamente!"
